<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3113/3113840.png">
    <title>Rasoa Pro V10 - Notifications Natives</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        
        .notification-popup {
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto;
        }

        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-[13px] md:text-[14px]">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const { useState, useEffect, useMemo, createElement: h } = React;

        const firebaseConfig = {
            apiKey: "",
            authDomain: "rasoa-pro.firebaseapp.com",
            projectId: "rasoa-pro",
            storageBucket: "rasoa-pro.firebasestorage.app",
            messagingSenderId: "344947402269",
            appId: "1:344947402269:web:76dfee1a27e780e80ac8f4"
        };
        const appId = "rasoa-pro-v4"; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                shoppingCart: [h('path', { key: '1', d: "M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" }), h('path', { key: '2', d: "M3 6h18" }), h('path', { key: '3', d: "M16 10a4 4 0 0 1-8 0" })],
                users: [h('path', { key: '1', d: "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" }), h('circle', { key: '2', cx: "9", cy: "7", r: "4" }), h('path', { key: '3', d: "M22 21v-2a4 4 0 0 0-3-3.87" }), h('path', { key: '4', d: "M16 3.13a4 4 0 0 1 0 7.75" })],
                trendingUp: [h('polyline', { key: '1', points: "22 7 13.5 15.5 8.5 10.5 2 17" }), h('polyline', { key: '2', points: "16 7 22 7 22 13" })],
                fileText: [h('path', { key: '1', d: "M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" }), h('polyline', { key: '2', points: "14 2 14 8 20 8" })],
                mapPin: [h('path', { key: '1', d: "M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" }), h('circle', { key: '2', cx: "12", cy: "10", r: "3" })],
                calendar: [h('rect', { key: '1', x: "3", y: "4", width: "18", height: "18", rx: "2", ry: "2" }), h('line', { key: '2', x1: "16", y1: "2", x2: "16", y2: "6" }), h('line', { key: '3', x1: "8", y1: "2", x2: "8", y2: "6" }), h('line', { key: '4', x1: "3", y1: "10", x2: "21", y2: "10" })],
                trash: [h('polyline', { key: '1', points: "3 6 5 6 21 6" }), h('path', { key: '2', d: "M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" })],
                search: [h('circle', { key: '1', cx: "11", cy: "11", r: "8" }), h('line', { key: '2', x1: "21", y1: "21", x2: "16.65", y2: "16.65" })],
                download: [h('path', { key: '1', d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }), h('polyline', { key: '2', points: "7 10 12 15 17 10" }), h('line', { key: '3', x1: "12", y1: "15", x2: "12", y2: "3" })],
                edit: [h('path', { key: '1', d: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" }), h('path', { key: '2', d: "M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" })],
                x: [h('line', { key: '1', x1: "18", y1: "6", x2: "6", y2: "18" }), h('line', { key: '2', x1: "6", y1: "6", x2: "18", y2: "18" })],
                bell: [h('path', { key: '1', d: "M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" }), h('path', { key: '2', d: "M13.73 21a2 2 0 0 1-3.46 0" })],
                check: [h('polyline', { key: '1', points: "20 6 9 17 4 12" })],
                info: [h('circle', { key: '1', cx: "12", cy: "12", r: "10" }), h('line', { key: '2', x1: "12", y1: "16", x2: "12", y2: "12" }), h('line', { key: '3', x1: "12", y1: "8", x2: "12.01", y2: "8" })]
            };
            return h('svg', { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2.5", strokeLinecap: "round", strokeLinejoin: "round", className: className }, icons[name] || null);
        };

        function App() {
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState("commandes");
            const [livraisons, setLivraisons] = useState([]);
            const [depenses, setDepenses] = useState([]);
            const [clients, setClients] = useState([]); 
            const [deliveryFilter, setDeliveryFilter] = useState("Aujourd'hui");
            const [clientSearch, setClientSearch] = useState("");
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [suggestedClients, setSuggestedClients] = useState([]);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [notifications, setNotifications] = useState([]);
            
            const [editingClient, setEditingClient] = useState(null);
            const [clientEditForm, setClientEditForm] = useState({ nom: "", telephone: "", lieu: "" });

            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            const [orderForm, setOrderForm] = useState({ 
                nom: "", telephone: "", lieu: "", montant: "", avance: "", typePaiement: "Avance", datePlanif: todayStr 
            });

            const [depenseForm, setDepenseForm] = useState({ libelle: "", montant: "", categorie: "Stock" });

            // --- FONCTIONS NATIVES ---
            
            const playNotificationSound = () => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.2);
                } catch(e) {}
            };

            // Système de notification unifié (App + Système + Vibration + Son)
            const notify = (title, message, type = "info") => {
                // 1. Vibration
                if ("vibrate" in navigator) {
                    navigator.vibrate([80, 40, 80]);
                }

                // 2. Son
                playNotificationSound();

                // 3. UI Notification (Facebook Style)
                const id = Date.now();
                setNotifications(prev => [...prev, { id, title, message, type }]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 5000);

                // 4. Notification Système (Barre de tâches)
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification(`Rasoa Pro: ${title}`, {
                        body: message,
                        icon: "https://cdn-icons-png.flaticon.com/512/3113/3113840.png"
                    });
                }
            };

            useEffect(() => {
                // Demande de permission notification système
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }

                const handleOnline = () => { 
                    setIsOffline(false); 
                    notify("Connexion Rétablie", "Vos données sont en cours de synchronisation.", "success");
                };
                const handleOffline = () => { 
                    setIsOffline(true); 
                    notify("Mode Hors Ligne", "L'application fonctionne localement.", "warning");
                };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                
                const app = initializeApp(firebaseConfig);
                const firestore = getFirestore(app);
                
                enableIndexedDbPersistence(firestore).catch((err) => {
                    console.warn("La persistance Firestore a échoué:", err.code);
                });

                setDb(firestore);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                if (!db) return;
                const livRef = collection(db, 'artifacts', appId, 'public', 'data', 'livraisons');
                const depRef = collection(db, 'artifacts', appId, 'public', 'data', 'depenses');
                const cliRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');

                const unsubLiv = onSnapshot(query(livRef, orderBy('timestamp', 'desc')), s => {
                    const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                    
                    const late = data.filter(l => l.datePlanif <= todayStr && l.statut !== 'Livré').length;
                    if (late > 0 && livraisons.length === 0) {
                        notify("Alertes Retards", `Attention, ${late} livraisons sont en retard !`, "error");
                    }
                    
                    setLivraisons(data);
                });
                
                const unsubDep = onSnapshot(query(depRef, orderBy('timestamp', 'desc')), s => {
                    setDepenses(s.docs.map(d => ({id: d.id, ...d.data()})));
                });

                const unsubCli = onSnapshot(cliRef, s => {
                    setClients(s.docs.map(d => ({id: d.id, ...d.data()})));
                });

                return () => { unsubLiv(); unsubDep(); unsubCli(); };
            }, [db]);

            const stats = useMemo(() => {
                const caReel = livraisons.filter(l => l.statut === "Livré").reduce((acc, l) => acc + (Number(l.montant) || 0), 0);
                const caPrevu = livraisons.reduce((acc, l) => acc + (Number(l.montant) || 0), 0);
                const totalDepenses = depenses.reduce((acc, d) => acc + (Number(d.montant) || 0), 0);
                const resteAEncaisser = livraisons.filter(l => l.statut !== "Livré").reduce((acc, l) => acc + ((Number(l.montant) || 0) - (Number(l.avance) || 0)), 0);
                return { caReel, caPrevu, totalDepenses, benefice: caReel - totalDepenses, resteAEncaisser };
            }, [livraisons, depenses]);

            const handleAddOrder = async () => {
                if(!orderForm.nom || !orderForm.montant) return;
                const mnt = Number(orderForm.montant) || 0;
                const av = orderForm.typePaiement === "Total" ? mnt : (Number(orderForm.avance) || 0);
                
                const orderData = { ...orderForm, montant: mnt, avance: av, statut: "En attente", timestamp: serverTimestamp() };
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'livraisons'), orderData);

                const existingClient = clients.find(c => c.nom === orderForm.nom || (orderForm.telephone && c.telephone === orderForm.telephone));
                if (existingClient) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', existingClient.id), {
                        totalVentes: (existingClient.totalVentes || 0) + mnt,
                        derniereCommande: serverTimestamp(),
                        lieu: orderForm.lieu || existingClient.lieu || ""
                    });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), {
                        nom: orderForm.nom,
                        telephone: orderForm.telephone,
                        lieu: orderForm.lieu || "",
                        totalVentes: mnt,
                        dateCreation: serverTimestamp()
                    });
                }
                
                notify("Vente Enregistrée", `Dossier créé pour ${orderForm.nom} (${mnt} Ar).`, "success");
                setOrderForm({ nom: "", telephone: "", lieu: "", montant: "", avance: "", typePaiement: "Avance", datePlanif: todayStr });
                setShowSuggestions(false);
            };

            const handleUpdateClient = async () => {
                if(!editingClient) return;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', editingClient.id), { ...clientEditForm });
                notify("Modification", "Informations du client mises à jour.", "success");
                setEditingClient(null);
            };

            const downloadCSV = () => {
                let csvRows = ["RAPPORT GLOBAL RASOA PRO", `CA Encaisse;${stats.caReel};Ar`, `CA Total;${stats.caPrevu};Ar`, `Depenses;${stats.totalDepenses};Ar`, `Net;${stats.benefice};Ar`, "", "DATE;TYPE;NOM;MONTANT;STATUT;TELEPHONE;LIEU"];
                livraisons.forEach(l => csvRows.push(`${l.datePlanif};VENTE;${l.nom};${l.montant};${l.statut};${l.telephone || ''};${l.lieu || ''}`));
                const blob = new Blob([csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `rasoa_export_${todayStr}.csv`;
                link.click();
                notify("Exportation", "Fichier prêt pour téléchargement.", "info");
            };

            const filterCounts = useMemo(() => ({
                "Aujourd'hui": livraisons.filter(l => l.datePlanif === todayStr && l.statut !== 'Livré').length,
                "Demain": livraisons.filter(l => l.datePlanif === tomorrowStr && l.statut !== 'Livré').length,
                "Retards": livraisons.filter(l => l.datePlanif <= todayStr && l.statut !== 'Livré').length,
                "En attente": livraisons.filter(l => l.statut === "En attente").length,
                "Livré": livraisons.filter(l => l.statut === "Livré").length
            }), [livraisons, todayStr, tomorrowStr]);

            const filteredLivraisons = useMemo(() => {
                if (deliveryFilter === "Aujourd'hui") return livraisons.filter(l => l.datePlanif === todayStr && l.statut !== 'Livré');
                if (deliveryFilter === "Demain") return livraisons.filter(l => l.datePlanif === tomorrowStr && l.statut !== 'Livré');
                if (deliveryFilter === "Retards") return livraisons.filter(l => l.datePlanif <= todayStr && l.statut !== 'Livré');
                if (deliveryFilter === "En attente") return livraisons.filter(l => l.statut === "En attente");
                return livraisons.filter(l => l.statut === deliveryFilter);
            }, [livraisons, deliveryFilter, todayStr, tomorrowStr]);

            const formatDate = (s) => s ? s.split('-').reverse().join('/') : "";

            if (!db) return h('div', { className: "h-screen flex items-center justify-center font-black animate-pulse text-indigo-600" }, "INITIALISATION...");

            return h('div', { className: "min-h-screen pb-24" },
                // --- ZONE DE NOTIFICATIONS POP-UP (Style Facebook) ---
                h('div', { className: "fixed top-4 left-0 right-0 z-[1000] flex flex-col items-center gap-3 px-4 pointer-events-none" }, 
                    notifications.map(n => h('div', { key: n.id, className: "pointer-events-auto" }, 
                        h('div', { 
                            className: `notification-popup w-full max-w-sm bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl border-l-8 p-4 flex items-center gap-4 ${
                                n.type === 'success' ? 'border-emerald-500' : 
                                n.type === 'error' ? 'border-rose-500' : 
                                n.type === 'warning' ? 'border-amber-500' : 'border-indigo-500'
                            }` 
                        }, [
                            h('div', { className: `w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${
                                n.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 
                                n.type === 'error' ? 'bg-rose-100 text-rose-600' : 
                                n.type === 'warning' ? 'bg-amber-100 text-amber-600' : 'bg-indigo-100 text-indigo-600'
                            }` }, h(Icon, { name: n.type === 'success' ? 'check' : n.type === 'error' ? 'bell' : 'info', size: 22 })),
                            h('div', { className: "flex-1 overflow-hidden" }, [
                                h('h4', { className: "font-black text-[13px] uppercase tracking-tight" }, n.title),
                                h('p', { className: "text-slate-500 text-[11px] font-semibold truncate" }, n.message)
                            ]),
                            h('button', { onClick: () => setNotifications(prev => prev.filter(notif => notif.id !== n.id)), className: "p-2 text-slate-300" }, h(Icon, { name: "x", size: 16 }))
                        ])
                    ))
                ),

                h('header', { className: "bg-white border-b px-6 py-4 flex items-center justify-between sticky top-0 z-[100] shadow-sm" },
                    h('div', { className: "flex items-center gap-3" },
                        h('div', { className: "w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg" }, "R"),
                        h('div', {}, [
                            h('h1', { className: "font-black text-xl italic leading-none" }, "RASOA PRO"),
                            h('p', { className: "text-[9px] font-black text-slate-400 uppercase tracking-widest" }, isOffline ? "MODE HORS-LIGNE" : "SYNC CONNECTÉ")
                        ])
                    ),
                    h('div', { className: "relative p-2" }, [
                        h(Icon, { name: "bell", className: "text-slate-400" }),
                        h('span', { className: "absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-rose-500 border-2 border-white rounded-full" })
                    ])
                ),

                h('main', { className: "max-w-7xl mx-auto p-4 lg:p-8" },
                    activeTab === 'commandes' && h('div', { className: "space-y-6 animate-fadeIn" }, [
                        h('div', { className: "grid lg:grid-cols-3 gap-8" }, [
                            h('div', { className: "lg:col-span-1" },
                                h('div', { className: "bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 sticky top-[100px]" },
                                    h('h2', { className: "font-black uppercase text-[11px] tracking-widest text-slate-400 mb-6" }, "Nouveau Dossier"),
                                    h('div', { className: "space-y-4 relative" },
                                        h('div', { className: "relative" },
                                            h('input', { value: orderForm.nom, onChange: e => { 
                                                setOrderForm(p=>({...p, nom: e.target.value})); 
                                                const f = clients.filter(c => c.nom?.toLowerCase().includes(e.target.value.toLowerCase())).slice(0,5); 
                                                setSuggestedClients(f); setShowSuggestions(e.target.value.trim().length > 0 && f.length > 0);
                                            }, placeholder: "Client", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none focus:border-indigo-600 shadow-inner" }),
                                            showSuggestions && h('div', { className: "absolute top-full left-0 right-0 bg-white border rounded-2xl mt-2 shadow-2xl z-50 overflow-hidden" },
                                                suggestedClients.map((c, i) => h('button', { key: i, onClick: () => { setOrderForm(p => ({...p, nom: c.nom, telephone: c.telephone || "", lieu: c.lieu || ""})); setShowSuggestions(false); }, className: "w-full p-4 text-left hover:bg-indigo-50 border-b last:border-0" }, [
                                                    h('p', { key: 'n', className: "font-black" }, c.nom), 
                                                    h('p', { key: 't', className: "text-[10px] text-indigo-500 font-bold" }, c.telephone || "Sans tel")
                                                ]))
                                            )
                                        ),
                                        h('input', { value: orderForm.telephone, onChange: e => setOrderForm({...orderForm, telephone: e.target.value}), placeholder: "Tél", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" }),
                                        h('input', { value: orderForm.lieu, onChange: e => setOrderForm({...orderForm, lieu: e.target.value}), placeholder: "Adresse", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" }),
                                        h('div', { className: "grid grid-cols-2 gap-3" }, [
                                            h('input', { type: "date", value: orderForm.datePlanif, onChange: e => setOrderForm({...orderForm, datePlanif: e.target.value}), className: "p-4 bg-slate-50 rounded-2xl font-bold border outline-none text-xs" }),
                                            h('input', { type: "number", value: orderForm.montant, onChange: e => setOrderForm({...orderForm, montant: e.target.value}), placeholder: "Prix", className: "p-4 bg-indigo-50 rounded-2xl font-black border border-indigo-100 outline-none text-indigo-600" })
                                        ]),
                                        h('div', { className: "flex p-1 bg-slate-100 rounded-2xl" },
                                            ['Avance', 'Total'].map(type => h('button', { key: type, onClick: () => setOrderForm({...orderForm, typePaiement: type, avance: type === 'Total' ? orderForm.montant : ""}), className: `flex-1 py-2 rounded-xl font-black text-[10px] transition-all ${orderForm.typePaiement === type ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}` }, type))
                                        ),
                                        orderForm.typePaiement === 'Avance' && h('input', { type: "number", value: orderForm.avance, onChange: e => setOrderForm({...orderForm, avance: e.target.value}), placeholder: "Acompte", className: "w-full p-4 bg-orange-50 rounded-2xl font-black border border-orange-100 outline-none text-orange-600" }),
                                        h('button', { onClick: handleAddOrder, className: "w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase text-[11px] shadow-lg active:scale-95 transition-all" }, "Valider la vente")
                                    )
                                )
                            ),
                            h('div', { className: "lg:col-span-2 space-y-6" }, [
                                h('div', { className: "flex gap-2 overflow-x-auto pb-2 scrollbar-hide sticky top-[80px] z-40 bg-slate-50/90 py-2 backdrop-blur-sm" }, 
                                    Object.keys(filterCounts).map(f => h('button', { key: f, onClick: () => setDeliveryFilter(f), className: `flex items-center gap-2 px-5 py-3 rounded-full border font-black text-[10px] uppercase transition-all whitespace-nowrap ${deliveryFilter === f ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-200'}` }, [
                                        f, h('span', { className: `px-1.5 py-0.5 rounded-md text-[9px] ${deliveryFilter === f ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-500'}` }, filterCounts[f])
                                    ]))
                                ),
                                h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4" }, 
                                    filteredLivraisons.map(l => h('div', { key: l.id, className: "bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm animate-fadeIn relative overflow-hidden" }, [
                                        h('div', { className: "flex justify-between items-start" }, [
                                            h('div', {}, [
                                                h('p', {className:"font-black uppercase text-slate-900 leading-tight"}, l.nom), 
                                                h('p', {className:"text-indigo-500 font-bold text-[10px] mb-2"}, l.telephone),
                                                h('div', {className:"flex items-center gap-1 text-slate-400 mb-1 font-bold text-[10px]"}, [h(Icon, {name:"mapPin", size:10}), l.lieu || "Lieu non défini"]),
                                                h('div', {className:"flex items-center gap-1 text-indigo-400 font-black text-[9px] uppercase"}, [h(Icon, {name:"calendar", size:10}), formatDate(l.datePlanif)])
                                            ]),
                                            h('button', { onClick: async () => { if (window.confirm("Supprimer ?")) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'livraisons', l.id)); notify("Supprimé", "Dossier retiré.", "warning"); } }, className: "p-2 text-slate-200 hover:text-rose-500" }, h(Icon, { name: "trash", size: 14 }))
                                        ]),
                                        h('div', { className: "flex justify-between border-t border-slate-50 mt-4 pt-4" }, [
                                            h('div', {}, [h('p', {className:"text-[8px] font-black text-slate-400 uppercase"}, "Montant"), h('p', {className:"font-black text-sm"}, `${(Number(l.montant)||0).toLocaleString()} Ar`)]),
                                            h('div', {}, [h('p', {className:"text-[8px] font-black text-rose-400 uppercase"}, "Reste"), h('p', {className:"font-black text-rose-600 text-sm"}, `${((Number(l.montant)||0) - (Number(l.avance)||0)).toLocaleString()} Ar`)])
                                        ]),
                                        l.statut !== "Livré" ? 
                                            h('button', { onClick: () => { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'livraisons', l.id), { statut: 'Livré', avance: l.montant }); notify("Succès", `Livraison confirmée pour ${l.nom}`, "success"); }, className: "w-full mt-4 bg-emerald-500 text-white py-3 rounded-2xl font-black uppercase text-[10px] active:scale-95 transition-all" }, "Confirmer Livraison ✓") :
                                            h('div', { className: "w-full mt-4 bg-emerald-50 text-emerald-600 py-3 rounded-2xl font-black uppercase text-[10px] text-center" }, "Terminé")
                                    ]))
                                )
                            ])
                        ])
                    ]),

                    activeTab === 'clients' && h('div', { className: "space-y-6 animate-fadeIn" }, [
                        h('div', { className: "bg-white p-6 rounded-[2.5rem] shadow-sm border flex items-center gap-4" }, [
                            h(Icon, { name: "search", className: "text-slate-400" }),
                            h('input', { value: clientSearch, onChange: e => setClientSearch(e.target.value), placeholder: "Rechercher un client...", className: "w-full bg-transparent font-bold outline-none text-lg" })
                        ]),
                        h('div', { className: "grid grid-cols-1 md:grid-cols-3 gap-6" }, 
                            clients.filter(c => (c.nom?.toLowerCase() || "").includes(clientSearch.toLowerCase())).map((c, i) => h('div', { key: c.id || i, className: "bg-white p-8 rounded-[3rem] border shadow-sm flex flex-col items-center text-center relative" }, [
                                h('button', { onClick: () => { setEditingClient(c); setClientEditForm({ nom: c.nom || "", telephone: c.telephone || "", lieu: c.lieu || "" }); }, className: "absolute top-6 right-6 p-2 text-slate-300 hover:text-indigo-600" }, h(Icon, { name: "edit", size: 16 })),
                                h('div', { className: "w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 font-black text-xl uppercase" }, (c.nom?.[0] || "?")),
                                h('p', { className: "font-black text-xl mb-1 uppercase" }, c.nom),
                                h('p', { className: "text-indigo-500 font-bold text-sm mb-4" }, c.telephone || "Aucun numéro"),
                                h('div', { className: "w-full grid grid-cols-2 gap-2 mb-6" }, [
                                    h('div', { className: "bg-slate-50 p-3 rounded-2xl" }, [h('p', {className:"text-[8px] font-black uppercase text-slate-400"}, "Volume"), h('p', {className:"font-black text-sm"}, `${(c.totalVentes || 0).toLocaleString()}`)]),
                                    h('div', { className: "bg-emerald-50 p-3 rounded-2xl text-emerald-600" }, [h('p', {className:"text-[8px] font-black uppercase"}, "Etat"), h('p', {className:"font-black text-[10px]"}, "Actif")])
                                ]),
                                h('div', { className: "w-full flex gap-2" }, [
                                    h('button', { onClick: () => { setOrderForm({...orderForm, nom: c.nom, telephone: c.telephone, lieu: c.lieu || ""}); setActiveTab('commandes'); }, className: "flex-1 bg-slate-900 text-white py-3 rounded-2xl font-black uppercase text-[9px]" }, "Vendre"),
                                    h('button', { onClick: async () => { if(window.confirm("Supprimer le client ?")) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', c.id)); notify("Suppression", `${c.nom} supprimé.`, "warning"); } }, className: "p-3 bg-slate-50 text-rose-500 rounded-2xl" }, h(Icon, {name:"trash", size:14}))
                                ])
                            ]))
                        )
                    ]),

                    activeTab === 'finances' && h('div', { className: "grid lg:grid-cols-3 gap-8 animate-fadeIn" }, [
                        h('div', { className: "lg:col-span-1" },
                            h('div', { className: "bg-white p-8 rounded-[2.5rem] border shadow-xl sticky top-[100px]" }, [
                                h('h2', { className: "font-black uppercase text-[11px] text-slate-400 mb-6" }, "Nouvelle Dépense"),
                                h('div', { className: "space-y-4" }, [
                                    h('input', { value: depenseForm.libelle, onChange: e => setDepenseForm({...depenseForm, libelle: e.target.value}), placeholder: "Libellé", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" }),
                                    h('input', { type: "number", value: depenseForm.montant, onChange: e => setDepenseForm({...depenseForm, montant: e.target.value}), placeholder: "Montant", className: "w-full p-4 bg-rose-50 rounded-2xl font-black border border-rose-100 outline-none text-rose-600" }),
                                    h('select', { value: depenseForm.categorie, onChange: e => setDepenseForm({...depenseForm, categorie: e.target.value}), className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" }, 
                                        ['Stock', 'Loyer', 'Salaires', 'Transport', 'Autre'].map(cat => h('option', { key: cat, value: cat }, cat))
                                    ),
                                    h('button', { onClick: async () => { 
                                        if(!depenseForm.libelle || !depenseForm.montant) return; 
                                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'depenses'), {...depenseForm, montant:Number(depenseForm.montant), timestamp:serverTimestamp()}); 
                                        notify("Dépense", `-${depenseForm.montant} Ar enregistré.`, "warning");
                                        setDepenseForm({libelle:"", montant:"", categorie:"Stock"}); 
                                    }, className: "w-full bg-rose-500 text-white py-5 rounded-3xl font-black uppercase text-[11px] shadow-lg" }, "Enregistrer Sortie")
                                ])
                            ])
                        ),
                        h('div', { className: "lg:col-span-2 space-y-4" }, 
                            depenses.map(d => h('div', { key: d.id, className: "bg-white p-6 rounded-[2rem] border shadow-sm flex items-center justify-between" }, [
                                h('div', {}, [h('p', {className:"font-black text-sm uppercase"}, d.libelle), h('span', {className:"text-[9px] font-black uppercase bg-slate-100 px-2 py-1 rounded text-slate-500"}, d.categorie)]),
                                h('div', {className:"flex items-center gap-4"}, [h('p', {className:"font-black text-rose-600 text-sm"}, `-${(Number(d.montant)).toLocaleString()} Ar`), h('button', {onClick:async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'depenses', d.id)); notify("Annulé", "Dépense supprimée.", "info"); }, className:"text-slate-200 hover:text-rose-500"}, h(Icon, {name:"trash", size:14}))])
                            ]))
                        )
                    ]),

                    activeTab === 'rapports' && h('div', { className: "space-y-8 animate-fadeIn" }, [
                        h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4" }, [
                            h('button', { onClick: downloadCSV, className: "flex items-center justify-center gap-3 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm font-black uppercase text-[10px] text-emerald-600" }, [h(Icon, {name: "download", size: 18}), "Télécharger Rapport CSV"])
                        ]),
                        h('div', { className: "grid grid-cols-2 md:grid-cols-4 gap-4" }, [
                            h('div', { className: "bg-emerald-500 p-6 rounded-[2.5rem] text-white shadow-xl" }, [h('p', {className:"text-[9px] font-black uppercase opacity-70"}, "Caisse Réelle"), h('p', {className:"text-xl font-black leading-tight"}, `${stats.caReel.toLocaleString()} Ar`)]),
                            h('div', { className: "bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-xl" }, [h('p', {className:"text-[9px] font-black uppercase opacity-70"}, "Objectif"), h('p', {className:"text-xl font-black leading-tight"}, `${stats.caPrevu.toLocaleString()} Ar`)]),
                            h('div', { className: "bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm text-rose-500" }, [h('p', {className:"text-[9px] font-black uppercase opacity-70"}, "Dépenses"), h('p', {className:"text-xl font-black leading-tight"}, `${stats.totalDepenses.toLocaleString()} Ar`)]),
                            h('div', { className: "bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl" }, [h('p', {className:"text-[9px] font-black uppercase opacity-70"}, "Profit Net"), h('p', {className:"text-xl font-black leading-tight"}, `${stats.benefice.toLocaleString()} Ar`)])
                        ])
                    ])
                ),

                editingClient && h('div', { className: "fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4" }, 
                    h('div', { className: "bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-6 animate-fadeIn" }, [
                        h('div', { className: "flex justify-between items-center" }, [h('h2', { className: "font-black uppercase text-sm text-indigo-600" }, "Editer Client"), h('button', { onClick: () => setEditingClient(null), className: "p-2 bg-slate-50 rounded-xl" }, h(Icon, {name:"x", size: 20}))]),
                        h('div', { className: "space-y-4" }, [
                            h('input', { value: clientEditForm.nom, onChange: e => setClientEditForm({...clientEditForm, nom: e.target.value}), placeholder: "Nom", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" }),
                            h('input', { value: clientEditForm.telephone, onChange: e => setClientEditForm({...clientEditForm, telephone: e.target.value}), placeholder: "Tél", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" }),
                            h('input', { value: clientEditForm.lieu, onChange: e => setClientEditForm({...clientEditForm, lieu: e.target.value}), placeholder: "Adresse", className: "w-full p-4 bg-slate-50 rounded-2xl font-bold border outline-none" })
                        ]),
                        h('button', { onClick: handleUpdateClient, className: "w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase text-[11px] shadow-lg" }, "Sauvegarder")
                    ])
                ),

                h('nav', { className: "fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t p-3 flex gap-1 z-[150] shadow-2xl" },
                    [
                        {id: 'commandes', label: 'Ventes', icon: 'shoppingCart'},
                        {id: 'clients', label: 'Clients', icon: 'users'},
                        {id: 'finances', label: 'Caisse', icon: 'trendingUp'},
                        {id: 'rapports', label: 'Stats', icon: 'fileText'}
                    ].map(tab => h('button', { 
                        key: tab.id, onClick: () => setActiveTab(tab.id),
                        className: `flex-1 py-3 flex flex-col items-center gap-1 rounded-2xl font-black text-[8px] uppercase transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`
                    }, [h(Icon, { key: 'ico', name: tab.icon, size: 18 }), tab.label]))
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
